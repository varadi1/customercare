version: "3.8"

services:
  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: hanna-chromadb
    restart: unless-stopped
    ports:
      - "8100:8000"
    volumes:
      - ./data/chromadb:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    container_name: hanna-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8101:8000"
    volumes:
      - ./data/documents:/app/documents
      - ./data:/app/data
      - /Users/varadiimre/obsidian-git-backup:/app/obsidian-vault:ro
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION=hanna_knowledge_bge_m3
      - EMBEDDING_BACKEND=bge-m3
      - BGE_M3_URL=http://host.docker.internal:8104
      - EMBEDDING_DIMENSIONS=1024
      - ANONYMIZED_TELEMETRY=false
      - CHROMA_TELEMETRY=false
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID}
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET}
      - GRAPH_USER_EMAIL=${GRAPH_USER_EMAIL}
      - SHARED_MAILBOXES=${SHARED_MAILBOXES:-info@neuzrt.hu,lakossagienergetika@neuzrt.hu}
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
