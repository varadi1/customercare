version: "3.8"

services:
  # ChromaDB removed 2026-02-21 — fully migrated to PostgreSQL+pgvector
  # Data preserved in ./data/chromadb if needed for reference

  backend:
    container_name: hanna-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8101:8000"
    volumes:
      - ./data/documents:/app/documents
      - ./data:/app/data
      - /Users/varadiimre/obsidian-git-backup:/app/obsidian-vault:rw
      - ./backend/scripts:/app/scripts:ro
    environment:
      - EMBEDDING_BACKEND=bge-m3
      - BGE_M3_URL=http://host.docker.internal:8104
      - EMBEDDING_DIMENSIONS=1024
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID}
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET}
      - GRAPH_USER_EMAIL=${GRAPH_USER_EMAIL}
      - SHARED_MAILBOXES=${SHARED_MAILBOXES:-info@neuzrt.hu,lakossagienergetika@neuzrt.hu}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
