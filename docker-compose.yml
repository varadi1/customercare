version: "3.8"

services:
  db:
    container_name: cc-db
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      - POSTGRES_USER=klara
      - POSTGRES_PASSWORD=klara_docs_2026
      - POSTGRES_DB=customercare
    volumes:
      - cc-pgdata:/var/lib/postgresql/data
      - ./backend/db/init_customercare.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klara -d customercare"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    container_name: cc-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8113:8000"
    volumes:
      - ./data/documents:/app/documents
      - ./data:/app/data
      - ${REPORT_DIR:-./data/reports}:/app/reports
      - ./backend/scripts:/app/scripts:ro
      - ./config:/app/config:ro
    environment:
      # Database
      - CC_PG_DSN=postgresql://klara:klara_docs_2026@cc-db:5432/customercare
      # Embedding
      - EMBEDDING_BACKEND=bge-m3
      - BGE_M3_URL=http://host.docker.internal:8104
      - EMBEDDING_DIMENSIONS=1024
      # LLM providers
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      # Email (MS Graph API)
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID}
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET}
      - GRAPH_USER_EMAIL=${GRAPH_USER_EMAIL}
      - SHARED_MAILBOXES=${SHARED_MAILBOXES:-}
      # Program-specific external DB (optional)
      - PROGRAM_DB_DRIVER=${PROGRAM_DB_DRIVER:-mysql}
      - PROGRAM_DB_HOST=${PROGRAM_DB_HOST:-}
      - PROGRAM_DB_PORT=${PROGRAM_DB_PORT:-3306}
      - PROGRAM_DB_USER=${PROGRAM_DB_USER:-}
      - PROGRAM_DB_PASSWORD=${PROGRAM_DB_PASSWORD:-}
      - PROGRAM_DB_NAME=${PROGRAM_DB_NAME:-}
      - PROGRAM_DB_ENABLED=${PROGRAM_DB_ENABLED:-false}
      # Reports & processing
      - REPORT_DIR=/app/reports
      - AUTO_PROCESS_ENABLED=${AUTO_PROCESS_ENABLED:-false}
      # Notifications
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
      # Langfuse (shared instance on :3001)
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://host.docker.internal:3001}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      # Program config
      - PROGRAM_CONFIG=${PROGRAM_CONFIG:-config/program.yaml}
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "10", "http://localhost:8000/livez"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 30s

volumes:
  cc-pgdata:
